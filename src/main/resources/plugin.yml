name: NemetonCore
version: '0.1.0-SNAPSHOT'
main: dev.nemeton.NemetonPlugin
api-version: '1.21.11'
authors: [Nemeton]
description: Clans, sanctuaries, claims and reversible raids for a community SMP.
depend: [WorldGuard, Citizens]
softdepend: [CoreProtect, DiscordSRV, floodgate, squaremap]
commands:
  clan:
    description: Gerencia clãs, claims, alianças e o cofre.
    usage: /clan ajuda
  santuario:
    description: Gerencia seu santuário pessoal.
    usage: /santuario ajuda
  raid:
    description: Declara e acompanha invasões.
    usage: /raid ajuda
  menu:
    description: Abre o painel principal do Nemeton, com interface nativa no Bedrock.
    usage: /menu
    aliases: [painel]
  nemeton:
    description: Retorna ao Nemeton.
    usage: /nemeton
    aliases: [spawn]
  guia:
    description: Recebe novamente o guia do Nemeton.
    usage: /guia
  kit:
    description: Recebe uma vez o kit inicial da alpha.
    usage: /kit
  lapide:
    description: Mostra a última lápide e aponta a bússola.
    usage: /lapide
  troca:
    description: Troca segura de itens entre jogadores.
    usage: /troca <jogador>
    aliases: [comercio]
  mapa:
    description: Entrega o mapa nativo e informa o mapa ao vivo.
    usage: /mapa
    aliases: [minimapa]
  mochila:
    description: Abre sua mochila pessoal fabricável.
    usage: /mochila
    aliases: [backpack]
  mods:
    description: Guia Vanilla+ e itens autorais do Nemeton.
    usage: /mods
    aliases: [vanillaplus, nemetonplus, reliquias]
  nemetonadmin:
    description: Manutenção visual e interativa do Nemeton.
    usage: /nemetonadmin construir|selar|npcs|status|setspawn|avaliar
    permission: nemeton.admin
permissions:
  nemeton.player:
    default: true
  nemeton.admin:
    default: op
  nemeton.builder:
    description: Permite construir manualmente apenas dentro do Nemeton protegido.
    default: false
