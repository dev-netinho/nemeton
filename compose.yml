services:
  database:
    image: mariadb:11.7
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME:-nemeton}
      MARIADB_USER: ${DB_USER:-nemeton}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      TZ: ${TZ:-America/Belem}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --innodb-flush-log-at-trx-commit=1
    volumes:
      - ./data/database:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
    deploy:
      resources:
        limits:
          memory: ${DB_MEMORY_LIMIT:-768M}

  minecraft:
    image: ${MC_IMAGE:-itzg/minecraft-server:java25}
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "25565:25565/tcp"
      - "19132:19132/udp"
      - "127.0.0.1:8100:8080/tcp"
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: ${MC_VERSION:-1.21.11}
      MEMORY: ${MC_MEMORY:-4G}
      INIT_MEMORY: ${MC_INIT_MEMORY:-1G}
      USE_AIKAR_FLAGS: "true"
      ONLINE_MODE: "true"
      ENFORCE_SECURE_PROFILE: "true"
      VIEW_DISTANCE: ${MC_VIEW_DISTANCE:-7}
      SIMULATION_DISTANCE: ${MC_SIMULATION_DISTANCE:-5}
      MAX_PLAYERS: ${MC_MAX_PLAYERS:-15}
      ALLOW_FLIGHT: "true"
      ENABLE_RCON: "true"
      RCON_PASSWORD: ${RCON_PASSWORD}
      MOTD: "Nemeton — survival comunitário Java + Bedrock"
      DIFFICULTY: hard
      SPAWN_PROTECTION: 0
      TZ: ${TZ:-America/Belem}
      DB_HOST: database
      DB_NAME: ${DB_NAME:-nemeton}
      DB_USER: ${DB_USER:-nemeton}
      DB_PASSWORD: ${DB_PASSWORD}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      PLUGINS: /extras/plugins
      # Geyser/Floodgate and spark are installed manually because their Modrinth resolution is not reliable for 1.21.11 today.
      MODRINTH_PROJECTS: "viaversion,discordsrv,luckperms,worldedit,worldguard,coreprotect,chunky,squaremap"
    volumes:
      - ./data/minecraft:/data
      - ./runtime/plugins:/extras/plugins:ro
      - ./runtime/datapacks/Vanilla+_structures.zip:/data/world/datapacks/Vanilla+_structures.zip:ro
    healthcheck:
      test: ["CMD", "mc-health"]
      start_period: 2m
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: ${MC_MEMORY_LIMIT:-5G}
