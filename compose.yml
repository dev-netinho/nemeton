services:
  database:
    image: mariadb:11.7
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME:-nemeton}
      MARIADB_USER: ${DB_USER:-nemeton}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      TZ: ${TZ:-America/Belem}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --innodb-flush-log-at-trx-commit=1
    volumes:
      - ./data/database:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
    deploy:
      resources:
        limits:
          memory: 1G

  minecraft:
    image: itzg/minecraft-server:java21
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "25565:25565/tcp"
      - "19132:19132/udp"
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: "1.21.11"
      MEMORY: 8G
      INIT_MEMORY: 2G
      USE_AIKAR_FLAGS: "true"
      ONLINE_MODE: "true"
      ENFORCE_SECURE_PROFILE: "true"
      VIEW_DISTANCE: 8
      SIMULATION_DISTANCE: 6
      MAX_PLAYERS: 30
      ENABLE_RCON: "true"
      RCON_PASSWORD: ${RCON_PASSWORD}
      MOTD: "Nemeton — survival comunitário Java + Bedrock"
      DIFFICULTY: hard
      SPAWN_PROTECTION: 0
      TZ: ${TZ:-America/Belem}
      DB_HOST: database
      DB_NAME: ${DB_NAME:-nemeton}
      DB_USER: ${DB_USER:-nemeton}
      DB_PASSWORD: ${DB_PASSWORD}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      MODRINTH_PROJECTS: "geyser,floodgate,viaversion,discordsrv,luckperms,worldedit,worldguard,coreprotect,shopkeepers,chunky,spark"
    volumes:
      - ./data/minecraft:/data
      - ./runtime/plugins:/plugins:ro
    healthcheck:
      test: ["CMD", "mc-health"]
      start_period: 2m
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 10G
